<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="fullname">Name:</label>
        <input type="text" placeholder="Enter your name" id="fullname" name="fullname" required><br>
        <!--Email-->
        <label for="mail">Email</label>
        <input type="email" placeholder="Enter Valid mail-id" name="mail" id="mail" >   <br>
        <!-- password -->
        <label for="psw">password</label>
        <input type="password" placeholder="" minlength="8" name="psw" id="psw"><br>

        <!--number input-->
        <label for="age">age</label>
        <input type="number" name="age" id="age" min="18" max="100"><br>
        
        <!-- radio button  -->
         <p>Gender</p>
         <input type="radio" id="male" name="Gender" value="male">
         <label for="Gender">male</label>
          
         <input type="radio" id="female" name="Gender" value="female">
         <label for="Gender">female</label>

         <!-- checkbox -->
          <p>technologies</p>
          <input type="checkbox" name="HTML" id="HTML" value="html">
          <label for="HTML">HTML</HTML></label><br>
          <input type="checkbox" name="CSS" id="CSS" value="css">
          <label for="CSS">css</HTML></label><br>

          <!-- dropdown -->
           <label for="country">Country</label>
           <select name="country" id="">
            <option value="india">India</option>
            <option value="usa">usa</option>
            <option value="uk">uk bruh</option>
           </select><br>

           <!-- text area -->
            <label for="message">Message</label>
            <textarea name="message" id="message" placeholder="please drop a message"></textarea><br>

            <!-- file upload -->
             <label for="resume">Upload Resume</label>
             <input type="file" name="resume" id="resume"><br>

             <!-- date picker -->
              <label for="dob">Date of Birth</label>
              <input type="date" name="dob " id="dob" ><br>
        <!-- button -->
         <button type="submit">submit</button> 
         <button type="reset">reset</button>   
    </form>
</body>
</html>
